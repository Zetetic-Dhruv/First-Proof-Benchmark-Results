  <line x1="288" y1="203" x2="298" y2="203" stroke="#bbb" stroke-width="2"/>
  <line x1="333" y1="203" x2="343" y2="203" stroke="#bbb" stroke-width="2"/>
  <line x1="378" y1="203" x2="388" y2="203" stroke="#bbb" stroke-width="2"/>
  <line x1="423" y1="203" x2="433" y2="203" stroke="#bbb" stroke-width="2"/>
  <line x1="468" y1="203" x2="478" y2="203" stroke="#bbb" stroke-width="2"/>
  <line x1="513" y1="203" x2="523" y2="203" stroke="#bbb" stroke-width="2"/>
  <line x1="558" y1="203" x2="568" y2="203" stroke="#bbb" stroke-width="2"/>
  <rect x="600" y="195" width="16" height="16" fill="#2563eb" rx="2" opacity="0.5"/>
  <rect x="645" y="195" width="16" height="16" fill="#2563eb" rx="2" opacity="0.5"/>

  <!-- Legend -->
  <rect x="230" y="238" width="12" height="12" fill="#2563eb" rx="2"/>
  <text x="247" y="249" font-size="10" fill="#333">Solved/Accepted</text>
  <circle cx="326" cy="244" r="6" fill="#f0c040"/>
  <text x="337" y="249" font-size="10" fill="#333">Partial</text>
  <polygon points="392,238 398,250 386,250" fill="#c0392b"/>
  <text x="403" y="249" font-size="10" fill="#333">Rejected</text>
  <line x1="448" y1="244" x2="460" y2="244" stroke="#bbb" stroke-width="2"/>
