  <!-- P1 no solution -->
  <line x1="243" y1="163" x2="253" y2="163" stroke="#bbb" stroke-width="2"/>
  <!-- P2 solved -->
  <rect x="285" y="155" width="16" height="16" fill="#2563eb" rx="2"/>
  <!-- P3 no solution -->
  <line x1="333" y1="163" x2="343" y2="163" stroke="#bbb" stroke-width="2"/>
  <!-- P4 no solution -->
  <line x1="378" y1="163" x2="388" y2="163" stroke="#bbb" stroke-width="2"/>
  <!-- P5 solved -->
  <rect x="420" y="155" width="16" height="16" fill="#2563eb" rx="2"/>
  <!-- P6 no solution -->
  <line x1="468" y1="163" x2="478" y2="163" stroke="#bbb" stroke-width="2"/>
  <!-- P7 solved -->
  <rect x="510" y="155" width="16" height="16" fill="#2563eb" rx="2"/>
  <!-- P8 solved (contested) -->
  <rect x="555" y="155" width="16" height="16" fill="#2563eb" rx="2" stroke="#f0c040" stroke-width="2"/>
